[[repos]]
repo = "builtin"
hooks = [
    { id = "check-added-large-files" },
    { id = "check-yaml" },
    { id = "check-json", exclude = "tsconfig.*\\.json" },
    { id = "check-json5", files = "tsconfig.*\\.json" },
    { id = "end-of-file-fixer" },
    { id = "trailing-whitespace" },
]

[[repos]]
repo = "local"
hooks = [
    {
        id = "biome-check",
        name = "Biome Check",
        entry = "bun x @biomejs/biome check --write .",
        language = "system",
        pass_filenames = false,
        always_run = true,
    },
    {
        id = "cargo-fmt",
        name = "Cargo Format",
        entry = "bash -c \"cd src-tauri && cargo fmt\"",
        language = "system",
        pass_filenames = false,
        always_run = true,
    },
    {
        id = "cargo-clippy",
        name = "Cargo Clippy",
        entry = "bash -c \"cd src-tauri && cargo clippy -- -D warnings\"",
        language = "system",
        pass_filenames = false,
        always_run = true,
    },
]
